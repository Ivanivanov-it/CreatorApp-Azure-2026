{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>Edit {{ enemy.name }}</h1>
        </div>
        <div class="card-body">
            <form method="POST" novalidate>
                {% csrf_token %}
                 {% if form.non_field_errors %}
        <div class="form-errors" >
            {{ form.non_field_errors }}
        </div>
    {% endif %}
                {% include 'enemies/_enemy_form.html' %}
                <button type="submit" class="btn btn-primary">Update</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
