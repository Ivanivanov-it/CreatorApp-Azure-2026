<div class="row mb-4 justify-content-center">
        <div class="col-md-6">
            <form class="d-flex" method="get" action=".">
                <div class="input-group">
                    <input type="text" name="query" class="form-control bg-dark text-light border-secondary" placeholder="Search..." aria-label="Search" value="{{ request.GET.query|default_if_none:'' }}">
                    <button class="btn btn-game-primary px-4" type="submit" style="font-size: 1rem; padding: 0.5rem 1.5rem;">Search</button>
                </div>
            </form>
        </div>
    </div>
