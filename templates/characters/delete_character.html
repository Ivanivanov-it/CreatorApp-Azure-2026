{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>Delete {{ character.name }}</h1>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                {% include 'characters/_character_form.html' %}
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
