{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-color: #1a1a2e; /* Dark background for game feel */
        color: #e0e0e0; /* Light text for contrast */
    }
    .section-title {
        font-size: 2.5rem;
        color: #8be9fd; /* A vibrant, game-like blue */
        margin-bottom: 1rem;
        text-shadow: 0 0 10px rgba(139, 233, 253, 0.6);
    }
    .card-game {
        background-color: #2a2a4a; /* Slightly lighter dark for cards */
        border: 1px solid #3a3a5a;
        border-radius: 0.5rem;
        padding: 1.5rem;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        height: 100%;
    }
    .card-game:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 25px rgba(139, 233, 253, 0.3);
    }
    .btn-game-primary {
        background-color: #8be9fd;
        border-color: #8be9fd;
        color: #1a1a2e;
        padding: 0.75rem 2rem;
        font-size: 1.25rem;
        font-weight: bold;
        text-transform: uppercase;
        border-radius: 0.3rem;
        transition: all 0.3s ease;
    }
    .btn-game-primary:hover {
        background-color: #67d0ed;
        border-color: #67d0ed;
        color: #1a1a2e;
        box-shadow: 0 0 15px rgba(139, 233, 253, 0.8);
        transform: translateY(-2px);
    }
</style>

<div class="container mt-5">
    <h2 class="section-title text-center mb-5">Select Your Enemy</h2>

    {% include 'search.html' %}

    <form method="post" class="text-center">
        {% csrf_token %}
        <div class="row justify-content-center">
            {% for e in enemies %}
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                <div class="card-game">
                    {% if e.image_url %}
                        <a href="{% url 'enemies:enemy_detail' e.pk %}" target="_blank">
                        <img src="{{ e.image_url }}" class="card-img-top mx-auto d-block mb-3" alt="{{ e.name }}" style="width: 150px; height: 150px; object-fit: cover; border-radius: 50%;">
                        </a>
                    {% else %}
                        <a href="{% url 'enemies:enemy_detail' e.pk %}" target="_blank">
                        <img src="{% static 'images/enemy.png' %}" class="card-img-top mx-auto d-block mb-3" alt="{{ e.name }}" style="width: 150px; height: 150px; object-fit: cover; border-radius: 50%;">
                        </a>
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <a href="{% url 'enemies:enemy_detail' e.id %}" target="_blank" class="text-info text-decoration-none">
                                {{ e.name | capfirst }}
                            </a>
                        </h5>
                        <div class="form-check d-flex justify-content-center align-items-center">
                            <input class="form-check-input" type="radio" name="enemy_id" id="enemy_{{ e.id }}" value="{{ e.id }}" {% if forloop.first %}checked{% endif %}>
                            <label class="form-check-label ms-2" for="enemy_{{ e.id }}">
                                Select
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
                <div class="col">
                    <p class="lead text-center">There are no enemies.</p>
                </div>
            {% endfor %}
        </div>
        <div class="mt-5">
            <a href="{% url 'battle:partner_selection' %}" class="btn btn-game-primary btn-lg">Go back</a>
            <button type="submit" class="btn btn-game-primary btn-lg">Start</button>
        </div>
    </form>
</div>
{% endblock %}
